name: API integration tests
vars:
  root: "."
  api_url: "http://localhost:8080"

testcases:
  - name: Health endpoint returns 200
    steps:
      - type: http
        url: "{{.api_url}}/health"
        assertions:
          - result.statuscode ShouldEqual 200

  - name: Echo endpoint works
    steps:
      - type: exec
        script: echo "hello"
        assertions:
          - result.code ShouldEqual 0
          - result.systemout ShouldEqual "hello"
